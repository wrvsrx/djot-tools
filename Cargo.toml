[workspace]
resolver = "2"
members = ["crates/djot-core", "crates/djot-ls", "crates/djot-export", "crates/djot-filter"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
jotdown = "0.10.0"
regex = "1.12.2"
toml = "1.1.2"
